<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a6b2e">
<title>GLT SafePass · Children's Check-in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f2f4f0;color:#1a1a18;font-size:15px;overscroll-behavior:none}
:root{
  --g:#1a6b2e;--gm:#1D9E75;--gl:#e4f4ea;--gd:#0f4a1e;
  --red:#a32d2d;--redl:#fcebeb;
  --amb:#7a4f00;--ambl:#faeeda;
  --blu:#0c447c;--blul:#e6f1fb;
  --pur:#534AB7;--purl:#eeedfe;
  --bdr:#d8e4d0;--card:#fff;
  --tx:#1a1a18;--mt:#5c6b5c;--ht:#8a9a8a;
  --r:10px;--rl:14px;--rxl:18px
}
#app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.hdr{background:var(--g);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:50}
.hdr img{height:38px;object-fit:contain}
.hdr-t h1{color:#fff;font-size:13.5px;font-weight:600;line-height:1.2}
.hdr-t p{color:rgba(255,255,255,.65);font-size:10.5px;margin-top:1px}
.hdr-r{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.dt{color:rgba(255,255,255,.7);font-size:10px}
.lv{display:flex;align-items:center;gap:4px}
.lv span{color:rgba(255,255,255,.95);font-size:11.5px;font-weight:500}
.user-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:2px;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pulse{width:7px;height:7px;border-radius:50%;background:#6ee7b7;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* sync bar removed - background sync */
.nav{display:flex;background:#fff;border-top:1.5px solid var(--bdr);flex-shrink:0;position:sticky;bottom:0;z-index:50}
.nav button{flex:1;min-width:0;padding:6px 2px 8px;border:none;background:none;font-size:10px;font-weight:500;color:var(--mt);cursor:pointer;border-top:2.5px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nav button.active{color:var(--g);border-top-color:var(--g)}
.nav button:active{background:#f6f9f4}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 16px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-ttl{font-size:11px;font-weight:600;color:var(--ht);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-hdr h3{font-size:14px;font-weight:600}
.sw{position:relative}
.sw input{width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:16px;background:#fff;outline:none;transition:border .15s;color:var(--tx);-webkit-appearance:none}
.sw input:focus{border-color:var(--g)}
.sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ht);pointer-events:none;display:flex}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;text-decoration:none;white-space:nowrap;-webkit-appearance:none;min-height:44px}
.btn:active{opacity:.85;transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--g);color:#fff;border-color:var(--g)}
.bo{background:#fff;color:var(--tx);border-color:var(--bdr)}
.bd{background:var(--redl);color:var(--red);border-color:#f0c5c5}
.bwa{background:#25D366;color:#fff}
.bsms{background:var(--blul);color:var(--blu);border-color:#b5d4f4}
.bpr{background:#f5f5f0;color:var(--tx);border-color:var(--bdr)}
.bsm{padding:8px 13px;font-size:12.5px;min-height:36px}
.bxs{padding:6px 10px;font-size:12px;min-height:36px}
.bfl{width:100%}
.cc{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s;cursor:pointer;min-height:68px}
.cc:active{background:#f6f9f4;border-color:var(--gm)}
.cc.in{border-left:4px solid var(--gm)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;letter-spacing:.02em;flex-shrink:0}
.av44{width:44px;height:44px;font-size:14px}
.av36{width:36px;height:36px;font-size:12px}
.av52{width:52px;height:52px;font-size:17px}
.ci{flex:1;min-width:0}
.cname{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px}
.cmeta{font-size:12px;color:var(--mt);margin-top:2px}
.calert{font-size:11.5px;color:var(--red);margin-top:3px;display:flex;align-items:center;gap:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;white-space:nowrap}
.bg{background:var(--gl);color:var(--gd)}
.ba{background:var(--ambl);color:var(--amb)}
.bb{background:var(--blul);color:var(--blu)}
.bgold{background:#faf3dc;color:#7a4f00}
.role-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.role-superadmin{background:#faeeda;color:#7a4f00}
.role-admin{background:var(--gl);color:var(--gd)}
.role-steward{background:var(--blul);color:var(--blu)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 8px;text-align:center}
.stat-n{font-size:26px;font-weight:700;line-height:1}
.stat-l{font-size:10.5px;color:var(--mt);margin-top:4px;font-weight:500}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--mt);margin-bottom:5px;letter-spacing:.03em}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:15px;background:#fff;color:var(--tx);outline:none;transition:border .15s;font-family:inherit;-webkit-appearance:none;min-height:44px}
.fg textarea{resize:vertical;min-height:72px;line-height:1.5;min-height:auto}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg .hint{font-size:11.5px;color:var(--ht);margin-top:5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:6px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ht);padding:6px;display:flex;min-height:0}
.cb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;min-height:44px}
.cb-row:last-child{border-bottom:none}
.cb-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.cb-row label{font-size:14px;cursor:pointer;flex:1}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200}
@media(min-width:520px){.mb{align-items:center;padding:20px}}
.modal{background:#fff;border-radius:var(--rxl) var(--rxl) 0 0;padding:18px 18px 40px;width:100%;max-width:480px;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:520px){.modal{border-radius:var(--rxl);padding:22px}}
.mh{width:40px;height:4px;background:#e0e0d8;border-radius:2px;margin:0 auto 14px;display:block}
.code-box{background:var(--gl);border:2px dashed var(--gm);border-radius:var(--r);padding:18px;text-align:center;margin:12px 0}
.code-val{font-size:28px;font-weight:800;color:var(--gd);letter-spacing:.15em;font-family:'Courier New',monospace}
.code-hint{font-size:12px;color:var(--g);margin-top:5px}
input.code-in{font-size:20px;font-weight:700;letter-spacing:.1em;text-align:center;text-transform:uppercase;font-family:'Courier New',monospace;padding:14px}
input.code-in::placeholder{font-size:14px;letter-spacing:.05em;color:#aaa;font-weight:400}
.alert{padding:11px 14px;border-radius:var(--r);font-size:13.5px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.as{background:var(--gl);color:var(--gd);border:1px solid #9FE1CB}
.ad{background:var(--redl);color:var(--red);border:1px solid #f7c1c1}
.aw{background:var(--ambl);color:var(--amb);border:1px solid #FAC775}
.ai{background:var(--blul);color:var(--blu);border:1px solid #b5d4f4}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:11px 22px;border-radius:30px;font-size:13.5px;font-weight:500;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.div{height:1px;background:var(--bdr);margin:14px 0}
.li{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.li:last-child{border-bottom:none}
.empty{text-align:center;padding:40px 16px;color:var(--mt)}
.care-card{background:var(--purl);border:1.5px solid #AFA9EC;border-radius:var(--r);padding:14px;margin:10px 0}
.care-ttl{font-size:12px;font-weight:600;color:var(--pur);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.care-item{font-size:13px;color:#3C3489;margin-bottom:6px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.pc{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:8px}
.pc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.pc-row{font-size:12px;color:var(--mt);display:flex;align-items:center;gap:5px;min-width:0}
.pc-row span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-kids{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.cpill{display:inline-flex;align-items:center;gap:4px;background:var(--gl);color:var(--gd);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.pc-acts{display:flex;gap:6px;border-top:1px solid var(--bdr);padding-top:10px;flex-wrap:wrap}
.sw-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* LAUNCH SCREEN */
.launch{position:fixed;inset:0;background:var(--g);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s ease}
.launch.hide{opacity:0;pointer-events:none}
.launch img{height:80px;object-fit:contain;margin-bottom:20px;animation:launchPop .5s ease;filter:brightness(0) invert(1)}
.launch-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px}
.launch-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:32px}
.launch-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.launch-bar{height:100%;background:#6ee7b7;border-radius:2px;animation:launchFill 2s ease forwards}
.launch-sub2{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px;margin-bottom:0}
@keyframes launchPop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes launchFill{from{width:0}to{width:100%}}
/* DURATION BADGE */
.dur-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(26,107,46,.12);color:var(--gd);padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.dur-badge.long{background:var(--redl);color:var(--red)}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--mt);font-size:13.5px;padding:40px}
.login-page{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#f2f4f0 0%,#e4f4ea 100%)}
.login-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rxl);padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(26,107,46,.08)}
.login-logo{text-align:center;margin-bottom:16px}
.login-logo img{height:52px;object-fit:contain}
.login-church{text-align:center;font-size:13px;font-weight:600;color:var(--g);margin-bottom:3px}
.login-sub{text-align:center;font-size:12px;color:var(--mt);margin-bottom:20px}
@media(max-width:380px){.frow{grid-template-columns:1fr}.hdr-t h1{font-size:12px}}
@media(min-width:600px){.nav button{font-size:11.5px;padding:8px 4px 10px}.scroll{padding:16px 16px 20px}}

/* ── COMMS TABS ── */
.comm-tab-btn{flex:1;padding:9px 6px;border:1.5px solid var(--bdr);background:#fff;color:var(--mt);border-radius:var(--r);font-size:13px;cursor:pointer}
.comm-tab-btn.active{border-color:var(--g);background:var(--gl);color:var(--gd);font-weight:600}
/* ── CLASS COLOR SWATCH ── */
.cl-swatch{width:10px;height:36px;border-radius:5px;flex-shrink:0}
/* ── PHOTO SYSTEM ── */
.photo-wrap{position:relative;display:inline-block}
.photo-img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.photo-upload-btn{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;font-size:13px;color:#fff;z-index:2}
.photo-upload-btn input{display:none}
.photo-placeholder{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;letter-spacing:.02em}
/* Activity feed */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-dot.ci{background:var(--g)}
.activity-dot.co{background:var(--amb)}
.activity-dot.reg{background:var(--blu)}
</style>
</head>

const hue=n=>Math.abs([...n].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length;
const genCode=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<7;i++)s+=c[Math.floor(Math.random()*c.length)];return 'GLT-'+s.slice(0,3)+'-'+s.slice(3);};
const today=()=>new Date().toDateString();
const fmtTime=t=>new Date(t).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'});
const fmtDate=()=>new Date().toLocaleDateString('en-NG',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
const todaySess=()=>C.sessions.filter(s=>new Date(s.checkin_time).toDateString()===today());
const openSess=cid=>todaySess().find(s=>s.child_id===cid&&!s.checkout_time);
const inside=()=>todaySess().filter(s=>!s.checkout_time).length;
const kidsOf=pid=>C.children.filter(c=>c.parent_id===pid);
const parentOf=cid=>{const c=C.children.find(x=>x.id===cid);return c?C.parents.find(p=>p.id===c.parent_id):null;};
const swName=id=>id?C.stewards.find(s=>s.id===id)?.name||'Unknown':'—';
const hasCare=c=>c&&(c.medication||c.feeding_notes||c.care_notes);
const roleBadge=r=>`<span class="role-badge role-${r||'steward'}">${ROLES[r]||r}</span>`;

function toast(msg,dur=2800){

}

function go(t){S.tab=t;S.modal=null;S.coResult=null;S.cForm=false;S.pForm=false;S.swForm=false;S.eCid=null;S.ePid=null;S.eSwId=null;S.pq='';S.swq='';S.changePwMode=false;render();}
function isSteward(){return!!ME;}
function confirmLogout(){if(confirm('Sign out as '+ME.name+'?'))logout();}
function toggleB(b){S.belongings=S.belongings.includes(b)?S.belongings.filter(x=>x!==b):[...S.belongings,b];}
function oCI(id){S.modal={type:'ci',cid:id,step:'confirm'};S.belongings=[];S.belongingsOther='';render();}
function viewChild(id){S.modal={type:'viewchild',cid:id};render();}
function cM(){S.modal=null;render();}

async function cfCI(cid){
  S.saving=true;render();
  try{
    const allB=[...S.belongings,S.belongingsOther].filter(Boolean).join(', ');
    const code=genCode();
    const rows=await db.addSession({child_id:cid,code,checkin_time:new Date().toISOString(),checkout_time:null,checkin_by:ME.id,checkout_by:null,belongings:allB||null});
    const sess=Array.isArray(rows)?rows[0]:rows;
    C.sessions.unshift(sess);
    S.saving=false;S.modal={type:'ci',cid,step:'code',sid:sess.id};render();
  }catch(e){S.saving=false;toast('Check-in failed: '+e.message);render();}
}

async function doCO(){
  const code=S.coCode.trim().toUpperCase();
  if(!code){toast('Please enter a pickup code');return;}
  const sess=C.sessions.find(s=>s.code===code&&!s.checkout_time&&new Date(s.checkin_time).toDateString()===today());
  if(!sess){S.coResult={error:'Code not recognised or already used today. Check the slip carefully.'};render();return;}
  S.saving=true;render();
  try{
    const t=new Date().toISOString();
    await db.updSession(sess.id,{checkout_time:t,checkout_by:ME.id});
    sess.checkout_time=t;sess.checkout_by=ME.id;
    S.coResult={cid:sess.child_id,sid:sess.id};S.coCode='';S.saving=false;render();
  }catch(e){S.saving=false;toast('Checkout failed: '+e.message);render();}
}

async function sC(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const name=g('f_cn'),age=g('f_ca'),class_group=g('f_cg'),parent_id=g('f_cpid'),alert_note=g('f_cal');
  const medication=g('f_med'),feeding_notes=g('f_feed'),care_notes=g('f_care');
  if(!name||!age||!parent_id){toast('Name, age and parent are required');return;}
  S.saving=true;render();
  try{
    const data={name,age,class_group,parent_id,alert_note,medication,feeding_notes,care_notes};
    if(S.eCid){
      await db.updChild(S.eCid,data);
      const idx=C.children.findIndex(c=>c.id===S.eCid);

async function sP(){

  if(!name||!phone){toast('Name and phone required');return;}
  const data={name,phone,whatsapp:g('f_pw'),email:g('f_pe'),emergency_phone:g('f_pep'),emergency_name:g('f_pen'),auth2:g('f_pa2'),auth3:g('f_pa3')};
  S.saving=true;render();
  try{

      await db.updParent(S.ePid,data);

}

}

async function doFirstSetup(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const errEl=document.getElementById('ft_err');
  if(errEl)errEl.style.display='none'; // reset previous error
  const show=m=>{if(errEl){errEl.textContent=m;errEl.style.display='flex';}};
  const name=g('ft_name'),phone=g('ft_phone'),email=g('ft_email'),
        uname=g('ft_uname').toLowerCase(),pass=g('ft_pass'),pass2=g('ft_pass2'),
        addr=g('ft_addr'),ec=g('ft_ec'),ep=g('ft_ep');
  if(!name){show('Please enter your full name');return;}
  if(!phone){show('Please enter your phone number');return;}
  if(!email){show('Please enter your email address');return;}
  if(!uname){show('Please choose a username');return;}
  if(uname.includes(' ')){show('Username cannot contain spaces');return;}
  if(pass.length<6){show('Password must be at least 6 characters');return;}
  if(pass!==pass2){show('Passwords do not match');return;}
  S.saving=true; render();
  try{
    const rows=await db.addSteward({name,username:uname,password:pass,role:'superadmin',phone,email,address:addr,emergency_contact:ec,emergency_phone:ep});
    const sw=Array.isArray(rows)?rows[0]:rows;
    C.stewards=[sw];
    signIn(sw);
    toast('Welcome, '+name+'! You are now signed in as Super Admin.');
  }catch(e){ 
    S.saving=false; 
    const msg='Error: '+(e.message||JSON.stringify(e)||'Unknown error. Check Supabase permissions.');
    alert(msg);
    if(errEl){errEl.textContent=msg;errEl.style.display='flex';} 
    render(); 
  }
}

function doLogin(){
  const u=S.loginUser.trim().toLowerCase();
  const p=S.loginPass;
  if(!u||!p){S.loginErr='Please enter your username and password';render();return;}
  const sw=C.stewards.find(s=>s.username?.toLowerCase()===u&&s.password===p&&s.is_active!==false);
  if(!sw){
    S.loginErr='Username or password is incorrect. Check carefully.';
    S.loginPass=''; render(); return;
  }
  // Update last_login async (don't block)
  db.updSteward(sw.id,{last_login:new Date().toISOString()}).catch(()=>{});
  signIn(sw);
}

function doForgot(){
  const name=S.forgotName.trim();
  if(!name){toast('Please enter your name');return;}
  const sw=C.stewards.find(s=>s.name.toLowerCase()===name.toLowerCase());
  if(!sw){S.forgotMsg='No account found for "'+name+'". Check your spelling or ask your Super Admin.';render();return;}
  S.forgotMsg=`Found: "${sw.name}" · Username: ${sw.username||'not set'} · Role: ${ROLES[sw.role]||sw.role}. Ask your Admin to reset your password if needed.`;
  render();
}

function bCO(){
  return `<div class="card">

    <p style="font-size:13.5px;color:var(--mt);margin-bottom:14px;line-height:1.6">Type the code from the parent's WhatsApp, SMS, or printed slip.</p>
    <div class="fg"><label>Pickup code</label>
      <input type="text" class="code-in" id="codeIn" placeholder="GLT-XXX-XXXX or EFK-9K3U" maxlength="15" value="${S.coCode}"
        oninput="S.coCode=this.value.toUpperCase();this.value=S.coCode"
        onkeydown="if(event.key==='Enter')doCO()" autocomplete="off" autocorrect="off" autocapitalize="characters">
    </div>
    <div class="hint" style="margin-bottom:10px;font-size:12px;color:var(--ht)">
      Enter the full code e.g. <b>GLT-EFK-9K3U</b> — or just the last part <b>EFK-9K3U</b>. Dashes and spaces are ignored.

    <div style="display:flex;gap:8px">
      <button class="btn bp bfl" style="flex:1" onclick="doCO()" ${S.saving?'disabled':''}>${S.saving?ic('refresh',16)+' Checking…':ic('shield-check')+' Verify &amp; Release'}</button>

    </div>
  </div>
  ${S.coResult?coResult():''}`;
}

function coResult(){
  const r=S.coResult;
  if(r.error)return`<div class="alert ad">${ic('alert-circle',18)}<div>${r.error}</div></div>`;
  const c=C.children.find(x=>x.id===r.cid);if(!c)return'';
  const p=parentOf(c.id);
  const sess=C.sessions.find(s=>s.id===r.sid);
  const checkoutTime=fmtTime(new Date());
  const collectedBy=ME.name;
  const coMsg=encodeURIComponent(`Dear ${p?.name||'Parent'}, your child ${c.name} has been safely collected at ${checkoutTime} by ${collectedBy}. Thank you for worshipping with us at God's Love Tabernacle. See you next Sunday! 🙏`);
  const coSMS=`GLT SafePass: ${c.name} was collected at ${checkoutTime}. God bless — GLT Children's Church.`;
  return`<div class="card"><div style="text-align:center;padding:12px 0">
    <div style="font-size:44px;margin-bottom:8px">✅</div>
    <div style="font-size:17px;font-weight:600;margin-bottom:3px">Child released</div>
    <div style="font-size:12.5px;color:var(--mt);margin-bottom:3px">By: <b>${ME.name}</b> · ${checkoutTime}</div>
    ${sess?.belongings?`<div style="font-size:12px;color:var(--amb);margin-bottom:10px">${ic('shopping-bag',13)} ${sess.belongings}</div>`:''}
    <div class="cc" style="max-width:320px;margin:0 auto 14px;cursor:default">
      ${photoAv(c.name,c.photo_url,44,hue(c.name))}
      <div class="ci"><div class="cname">${c.name}</div><div class="cmeta">${c.class_group}${p?' · '+p.name:''}</div></div>
      <span class="badge ba">Released</span>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--mt)">Send pickup confirmation to parent:</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${p?.whatsapp?`<a href="https://wa.me/${p.whatsapp}?text=${coMsg}" target="_blank" class="btn bwa bsm">${ic('brand-whatsapp')} WhatsApp</a>`:''}
      ${p?.phone?`<a href="sms:${p.phone}?body=${encodeURIComponent(coSMS)}" class="btn bsms bsm">${ic('device-mobile-message')} SMS</a>`:''}
    </div>
  </div></div>`;
}

async function compressImage(file, maxKB=60){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        const maxDim=400; // max 400px
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        // Try quality from 0.8 down until under maxKB
        let q=0.82,dataUrl='';
        do{
          dataUrl=canvas.toDataURL('image/jpeg',q);
          q-=0.05;
        }while(dataUrl.length>maxKB*1024*1.37&&q>0.3);
        resolve(dataUrl);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(file, folder, id){
  // Compress first
  const dataUrl=await compressImage(file);
  const base64=dataUrl.split(',')[1];
  const byteArr=Uint8Array.from(atob(base64),c=>c.charCodeAt(0));
  const filename=folder+'/'+id+'_'+Date.now()+'.jpg';
  const resp=await fetch('${SB_URL}/storage/v1/object/glt-photos/'+filename,{
    method:'POST',
    headers:{'apikey':'${SB_KEY}','Authorization':'Bearer ${SB_KEY}','Content-Type':'image/jpeg','x-upsert':'true'},
    body:byteArr
  });
  if(!resp.ok)throw new Error('Upload failed: '+await resp.text());
  return '${SB_URL}/storage/v1/object/public/glt-photos/'+filename;
}

function photoInput(folder, id, currentUrl, size=44){
  const cl=size>=52?col(0):{bg:'#e4f4ea',fg:'#1a6b2e'}; // placeholder
  const inputId='photo_'+folder+'_'+id;

    return `<div class="photo-wrap" style="width:${size}px;height:${size}px">
      <img class="photo-img" src="${currentUrl}" alt="Photo" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
      <div class="photo-placeholder" style="display:none;background:#e4f4ea;color:#1a6b2e;font-size:${size>44?18:14}px;width:${size}px;height:${size}px">?</div>
      <label class="photo-upload-btn" for="${inputId}" title="Change photo">+<input type="file" id="${inputId}" accept="image/*" onchange="handlePhotoChange(this,'${folder}','${id}')"></label>
    </div>`;
  }
  return `<div class="photo-wrap" style="width:${size}px;height:${size}px">
    <div class="photo-placeholder" style="background:#e4f4ea;color:#1a6b2e;font-size:${size>44?18:14}px;width:${size}px;height:${size}px">+</div>

async function handlePhotoChange(input, folder, id){
  if(!input.files[0])return;
  const file=input.files[0];
  toast('Compressing & uploading photo…');
  try{
    const url=await uploadPhoto(file,folder,id);
    // Update in DB and cache
    if(folder==='children'){
      await db.updChild(id,{photo_url:url});
      const c=C.children.find(x=>x.id===id);if(c)c.photo_url=url;
    }else if(folder==='parents'){
      await db.updParent(id,{photo_url:url});
      const p=C.parents.find(x=>x.id===id);if(p)p.photo_url=url;
    }else if(folder==='stewards'){
      await db.updSteward(id,{photo_url:url});
      const s=C.stewards.find(x=>x.id===id);if(s)s.photo_url=url;
      if(ME&&ME.id===id){ME.photo_url=url;sessionStorage.setItem('glt_me',JSON.stringify(ME));}
    }
    toast('Photo saved!');render();
  }catch(e){toast('Photo upload failed: '+e.message);}
}

async function doOpenSession(){
  if(activeChurchSession){toast('A session is already open. Close it first.');return;}
  const g = id=>document.getElementById(id)?.value?.trim()||'';
  const type=g('sess_type')||S_sess.ptype;
  const cname=g('sess_name')||S_sess.pname;
  if(type==='special'&&!cname){toast('Please enter the program name');return;}
  S_sess.saving=true; render();
  try{
    const rows = await dbSess.open({
      date: g('sess_date')||new Date().toISOString().slice(0,10),
      program_type: type,
      custom_name: cname||null,
      notes: g('sess_notes')||null,
      opened_by: ME.id,
      opened_at: new Date().toISOString(),
      status:'open'
    });
    activeChurchSession = Array.isArray(rows)?rows[0]:rows;

}

async function doCloseSession(){
  if(!activeChurchSession)return;
  const prog=progLabel(activeChurchSession.program_type,activeChurchSession.custom_name);
  const total=todaySess().filter(s=>s.church_session_id===activeChurchSession.id).length;
  if(!confirm(`Close "${prog}"?\n\n${total} children were checked in this session.`))return;
  try{
    await dbSess.close(activeChurchSession.id);
    activeChurchSession=null;
    toast('Session closed'); render();

}

async function doCO(){
  const raw=S.coCode.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!raw){toast('Please enter a pickup code');return;}
  const sess=C.sessions.find(s=>{
    if(!s.code||s.checkout_time)return false;
    if(new Date(s.checkin_time).toDateString()!==today())return false;
    const stored=s.code.replace(/[^A-Z0-9]/g,'');
    return stored===raw||stored.replace(/^GLT/,'')===raw||raw===stored.replace(/^GLT/,'');
  });
  if(!sess){S.coResult={error:'Code not found. Check the code on the parent\'s slip and try again.'};render();return;}
  S.saving=true; render();
  try{
    const t=new Date().toISOString();
    await db.updSession(sess.id,{checkout_time:t,checkout_by:ME.id});
    sess.checkout_time=t; sess.checkout_by=ME.id;
    S.coResult={cid:sess.child_id,sid:sess.id};
    S.coCode=''; S.saving=false; render();
  }catch(e){S.saving=false; toast('Checkout failed: '+e.message); render();}
}

function buildSessionHistory(){
  // Group sessions by church_session_id if available, else by date
  const bySession={};
  C.sessions.forEach(s=>{
    const key=s.church_session_id||new Date(s.checkin_time).toDateString();
    if(!bySession[key]){
      const csess=C.churchSessions?.find(x=>x.id===s.church_session_id);
      bySession[key]={
        label: csess ? shortLabel(csess.program_type,csess.custom_name,csess.date) : new Date(s.checkin_time).toLocaleDateString('en-NG',{day:'numeric',month:'short'}),
        count:0, date: s.checkin_time
      };
    }
    bySession[key].count++;
  });
  return Object.values(bySession)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .slice(-8);
}

function shortLabel(type,cname,date){
  const d=new Date(date).toLocaleDateString('en-NG',{day:'numeric',month:'short'});
  const t={sunday_1st:'Sun1',sunday_2nd:'Sun2',bible_study:'Bible',youth:'Youth',special:cname?.slice(0,6)||'Spec'}[type]||type;
  return t+'\n'+d;
}

/* ══════════════════════════════════════════════════════════
   ENHANCED EXPORT / REPORTS
══════════════════════════════════════════════════════════ */
function exportCSV(type){
  const now=new Date();
  const dateStr=now.toISOString().slice(0,10);
  const church='God\'s Love Tabernacle International Church — GLT SafePass';

  if(type==='sessions'){
    // Session history report
    let out=`GLT SafePass — Session History Report\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Date','Program','Opened By','Opened At','Closed At','Total Check-ins','Unique Children','Released','Still Inside']);
    // Group checkins by church_session_id
    const sessMap={};
    C.sessions.forEach(s=>{
      const key=s.church_session_id||'unlinked';
      if(!sessMap[key]){sessMap[key]={total:0,released:0,inside:0,children:new Set()};}
      sessMap[key].total++;
      sessMap[key].children.add(s.child_id);
      if(s.checkout_time)sessMap[key].released++;
      else sessMap[key].inside++;
    });
    // Sort church sessions by date
    const cSessions=(C.churchSessions||[]).sort((a,b)=>new Date(b.opened_at)-new Date(a.opened_at));
    cSessions.forEach(cs=>{
      const data=sessMap[cs.id]||{total:0,released:0,inside:0,children:new Set()};
      out+=rowCSV([
        new Date(cs.date).toLocaleDateString('en-NG'),
        progLabel(cs.program_type,cs.custom_name),
        swName(cs.opened_by),
        fmtTime(cs.opened_at),
        cs.closed_at?fmtTime(cs.closed_at):'Still open',
        data.total, data.children.size, data.released, data.inside
      ]);
    });
    downloadCSV('GLT_SafePass_SessionHistory_'+dateStr+'.csv',out);
  }

  else if(type==='absentees'){
    const absent=C.children.filter(c=>{
      const last=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
      return !last||Math.floor((Date.now()-new Date(last.checkin_time))/(7*24*60*60*1000))>=3;
    });
    let out=`GLT SafePass — Absentee Report (3+ Weeks)\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Child Name','Class Group','Parent Name','Phone','WhatsApp','Last Seen','Weeks Absent','Total Visits']);
    absent.forEach(c=>{
      const p=parentOf(c.id);
      const allSess=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time));
      const last=allSess[0];
      const weeks=last?Math.floor((Date.now()-new Date(last.checkin_time))/(7*24*60*60*1000)):'Never';
      out+=rowCSV([c.name,c.class_group,p?.name||'',p?.phone||'',p?.whatsapp||'',
        last?new Date(last.checkin_time).toLocaleDateString('en-NG'):'Never attended',
        weeks, allSess.length]);
    });
    out+=`\r\nTotal absentees: ${absent.length}\r\n`;
    downloadCSV('GLT_SafePass_AbsenteeReport_'+dateStr+'.csv',out);
  }

  else if(type==='stewards'){
    let out=`GLT SafePass — Steward Activity Report\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Steward Name','Role','Check-ins Performed','Check-outs Performed','Last Active','Sessions Worked']);
    C.stewards.forEach(sw=>{
      const cins=C.sessions.filter(s=>s.checkin_by===sw.id).length;
      const couts=C.sessions.filter(s=>s.checkout_by===sw.id).length;
      const lastActive=[...C.sessions.filter(s=>s.checkin_by===sw.id||s.checkout_by===sw.id)]
        .sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
      const sessWorked=new Set(C.sessions.filter(s=>s.checkin_by===sw.id).map(s=>s.church_session_id||new Date(s.checkin_time).toDateString())).size;
      out+=rowCSV([sw.name,sw.role,cins,couts,
        lastActive?new Date(lastActive.checkin_time).toLocaleDateString('en-NG'):'Never',sessWorked]);
    });
    downloadCSV('GLT_SafePass_StewardActivity_'+dateStr+'.csv',out);
  }

  else if(type==='today'){
    const ts=todaySess();
    const sessLabel=activeChurchSession?progLabel(activeChurchSession.program_type,activeChurchSession.custom_name):'No session';
    let out=`GLT SafePass — Today's Attendance\r\n${church}\r\n`;
    out+=`Session: ${sessLabel}\r\nDate: ${now.toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Child Name','Age','Class','Parent','Phone','Check-in','Check-out','Duration (min)','Steward In','Steward Out','Belongings','Parent Absent','Code']);
    ts.forEach(s=>{
      const c=C.children.find(x=>x.id===s.child_id);const p=parentOf(s.child_id);
      const dur=s.checkout_time?Math.round((new Date(s.checkout_time)-new Date(s.checkin_time))/60000):'Still inside';
      out+=rowCSV([c?.name||'',c?.age||'',c?.class_group||'',p?.name||'',p?.phone||'',
        fmtTime(s.checkin_time),s.checkout_time?fmtTime(s.checkout_time):'',dur,
        swName(s.checkin_by),swName(s.checkout_by),s.belongings||'',s.parent_absent?'Yes':'No',s.code]);
    });
    out+=`\r\nSUMMARY\r\nTotal checked in:,${ts.length}\r\nStill inside:,${ts.filter(s=>!s.checkout_time).length}\r\nReleased:,${ts.filter(s=>s.checkout_time).length}\r\nAttendance rate:,${C.children.length>0?Math.round(ts.length/C.children.length*100):0}%\r\n`;
    downloadCSV('GLT_SafePass_Attendance_'+dateStr+'.csv',out);
  }

  else if(type==='children'){
    let out=`GLT SafePass — Children Register\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Full Name','Age','Class Group','Parent','Phone','WhatsApp','Email','Auth Person 2','Auth Person 3','Emergency','Emergency Phone','Alert','Medication','Feeding Notes','Total Visits','Last Seen','Registered']);
    C.children.forEach(c=>{
      const p=parentOf(c.id);
      const visits=C.sessions.filter(s=>s.child_id===c.id).length;
      const last=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
      out+=rowCSV([c.name,c.age,c.class_group,p?.name||'',p?.phone||'',p?.whatsapp||'',p?.email||'',
        p?.auth2||'',p?.auth3||'',p?.emergency_name||'',p?.emergency_phone||'',
        c.alert_note||'',c.medication||'',c.feeding_notes||'',
        visits, last?new Date(last.checkin_time).toLocaleDateString('en-NG'):'Never',
        new Date(c.created_at).toLocaleDateString('en-NG')]);
    });
    downloadCSV('GLT_SafePass_ChildrenRegister_'+dateStr+'.csv',out);
  }

  else if(type==='parents'){
    let out=`GLT SafePass — Parents Register\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Full Name','Phone','WhatsApp','Email','Emergency Contact','Emergency Phone','Auth Person 2','Auth Person 3','Children','Total Family Visits']);
    C.parents.forEach(p=>{
      const kids=kidsOf(p.id);
      const visits=kids.reduce((sum,c)=>sum+C.sessions.filter(s=>s.child_id===c.id).length,0);
      out+=rowCSV([p.name,p.phone,p.whatsapp||'',p.email||'',p.emergency_name||'',p.emergency_phone||'',
        p.auth2||'',p.auth3||'',kids.map(c=>c.name).join('; '),visits]);
    });
    downloadCSV('GLT_SafePass_ParentsRegister_'+dateStr+'.csv',out);
  }

  else if(type==='summary'){
    const bySession={};
    C.sessions.forEach(s=>{
      const key=s.church_session_id||new Date(s.checkin_time).toDateString();
      if(!bySession[key]){
        bySession[key]={label:new Date(s.checkin_time).toLocaleDateString('en-NG'),total:0,released:0,classes:{}};
      }
      bySession[key].total++;
      if(s.checkout_time)bySession[key].released++;
      const c=C.children.find(x=>x.id===s.child_id);
      if(c){if(!bySession[key].classes[c.class_group])bySession[key].classes[c.class_group]=0;bySession[key].classes[c.class_group]++;}
    });
    let out=`GLT SafePass — Attendance Summary Report\r\n${church}\r\nGenerated: ${now.toLocaleString('en-NG')}\r\n\r\n`;
    out+=rowCSV(['Session / Date','Total','Released','Still Inside','Attendance %',...GROUPS]);
    Object.values(bySession).reverse().forEach(d=>{
      const pct=C.children.length>0?Math.round(d.total/C.children.length*100):0;
      out+=rowCSV([d.label,d.total,d.released,d.total-d.released,pct+'%',...GROUPS.map(g=>d.classes[g]||0)]);
    });
    out+=`\r\nGRAND TOTAL\r\nTotal sessions:,${Object.keys(bySession).length}\r\nTotal check-ins:,${C.sessions.length}\r\nChildren registered:,${C.children.length}\r\nParents registered:,${C.parents.length}\r\n`;
    downloadCSV('GLT_SafePass_SummaryReport_'+dateStr+'.csv',out);
  }
}

/* ── Duration formatter ── */
function fmtDur(checkinTime){
  const mins=Math.floor((Date.now()-new Date(checkinTime))/60000);
  if(mins<60)return mins+'m';
  const h=Math.floor(mins/60),m=mins%60;
  return h+'h'+(m>0?' '+m+'m':'');
}
function durBadge(checkinTime){
  const mins=Math.floor((Date.now()-new Date(checkinTime))/60000);
  const cls=mins>180?' long':'';
  return `<span class="dur-badge${cls}">${fmtDur(checkinTime)}</span>`;
}

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
        <div style="background:#f9fdf9;border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--g)">${children.length}</div>
          <div style="font-size:10px;color:var(--mt)">Enrolled</div>
        </div>
        <div style="background:#f9fdf9;border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--gm)">${presentToday.length}</div>
          <div style="font-size:10px;color:var(--mt)">Today</div>
        </div>
        <div style="background:#f9fdf9;border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--blu)">${stillIn.length}</div>
          <div style="font-size:10px;color:var(--mt)">Inside</div>
        </div>
        <div style="background:${absent3.length>0?'#fcebeb':'#f9fdf9'};border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:${absent3.length>0?'var(--red)':'var(--mt)'}">${absent3.length}</div>
          <div style="font-size:10px;color:var(--mt)">3wk absent</div>
        </div>
      </div>
      <!-- Children roster -->
      ${children.length>0?`<div style="border-top:1px solid var(--bdr);padding-top:10px">
        <div style="font-size:11px;font-weight:600;color:var(--ht);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Children in this class</div>
        ${children.map(c=>{
          const sess=openSess(c.id);
          const p=parentOf(c.id);
          const last=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
          const weeksAgo=last?Math.floor((Date.now()-new Date(last.checkin_time))/(7*24*60*60*1000)):99;
          const isAbsent=weeksAgo>=3;
          return`<div class="li" style="min-height:48px">
            ${photoAv(c.name,c.photo_url,36,hue(c.name))}
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:600">${c.name}${isAbsent?` <span style="font-size:10px;background:var(--redl);color:var(--red);padding:1px 6px;border-radius:10px">Absent ${weeksAgo}wk</span>`:''}</div>
              <div style="font-size:11px;color:var(--mt)">${p?p.name:''}</div>
            </div>
            ${sess?`<span class="badge bg" style="font-size:10.5px">${ic('check',11)} In · ${durBadge(sess.checkin_time)}</span>`
              :`<span style="font-size:11px;color:var(--ht)">Not in</span>`}
          </div>`;
        }).join('')}
      </div>`:''}
      ${absent3.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)">
        <button class="btn bd bsm bfl" onclick="commAbsentClass('${cl.class_group}')" style="font-size:12.5px">
          ${ic('brand-whatsapp',14)} Follow up ${absent3.length} absent child${absent3.length!==1?'ren':''} in this class
        </button>
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function clForm(){
  const d=S.eClId?C.classes.find(x=>x.id===S.eClId):S.nc_cl;
  const COLORS_CL=['#1a6b2e','#0c447c','#7a4f00','#534AB7','#a32d2d','#075e54'];
  return`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn bo bsm" onclick="cClF()">${ic('arrow-left')}</button>
      <h3 style="font-size:15px;font-weight:600">${S.eClId?'Edit class':'Create class'}</h3>
    </div>
    <div class="fg"><label>Class name *</label><input type="text" id="cl_name" value="${d.name}" placeholder="e.g. Junior Church A"></div>
    <div class="fg"><label>Description</label><input type="text" id="cl_desc" value="${d.description||''}" placeholder="e.g. Ages 8-10, meets in Room 3"></div>
    <div class="frow">
      <div class="fg"><label>Class group *</label>
        <select id="cl_grp">${GROUPS.map(g=>`<option ${d.class_group===g?'selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>Teacher / volunteer</label><input type="text" id="cl_tchr" value="${d.teacher||''}" placeholder="e.g. Sis. Joy Obi"></div>
    </div>
    <div class="fg"><label>Capacity</label><input type="number" id="cl_cap" value="${d.capacity||30}" min="1" max="200" inputmode="numeric"></div>
    <div class="fg"><label>Colour</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${COLORS_CL.map(c=>`<div onclick="document.getElementById('cl_clr').value='${c}';render()" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${d.color===c?'#fff':'transparent'};outline:2px solid ${d.color===c?c:'transparent'}"></div>`).join('')}
        <input type="color" id="cl_clr" value="${d.color||'#1a6b2e'}" style="width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;padding:0">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn bp bfl" style="flex:1" onclick="sCl()" ${S.saving?'disabled':''}>${S.saving?ic('refresh',16)+' Saving…':ic('check')+' '+(S.eClId?'Save':'Create class')}</button>
      <button class="btn bo" onclick="cClF()">Cancel</button>
    </div>
  </div>`;
}

function oClR(){S.clForm=true;S.eClId=null;S.nc_cl={name:'',description:'',teacher:'',class_group:GROUPS[0],capacity:30,color:'#1a6b2e'};render();}
function oClE(id){S.eClId=id;S.clForm=true;render();}
function cClF(){S.clForm=false;S.eClId=null;render();}

async function sCl(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const name=g('cl_name'),class_group=g('cl_grp');
  if(!name){toast('Class name is required');return;}
  const data={name,description:g('cl_desc'),teacher:g('cl_tchr'),class_group,capacity:parseInt(g('cl_cap'))||30,color:g('cl_clr')||'#1a6b2e',is_active:true};
  S.saving=true;render();
  try{
    if(S.eClId){
      await db.updClass(S.eClId,data);
      const idx=C.classes.findIndex(x=>x.id===S.eClId);
      if(idx>=0)C.classes[idx]={...C.classes[idx],...data};
    }else{
      const rows=await db.addClass(data);
      C.classes.push(Array.isArray(rows)?rows[0]:rows);
    }
    S.saving=false;S.clForm=false;S.eClId=null;toast(S.eClId?'Class updated':'Class created');render();
  }catch(e){S.saving=false;toast('Failed: '+e.message);render();}
}

async function dCl(id){
  const cl=C.classes.find(x=>x.id===id);
  if(!confirm('Delete class "'+cl.name+'"?'))return;
  try{await db.delClass(id);C.classes=C.classes.filter(x=>x.id!==id);toast('Class deleted');render();}
  catch(e){toast('Failed: '+e.message);}
}

/* ══ COMMUNICATIONS CENTRE ══ */
function bComms(){
  if(!isAdm())return`<div class="empty">${ic('lock',36)}<div style="margin-top:10px">Admin only</div></div>`;
  if(S.tmplForm)return tmplForm();
  const tabs=[{id:'broadcast',lbl:'Broadcast'},{id:'followup',lbl:'Follow-up'},{id:'templates',lbl:'Templates'}];
  return`
  <!-- TABS -->
  <div style="display:flex;gap:6px;margin-bottom:12px">
    ${tabs.map(t=>`<button onclick="S.commTab='${t.id}';render()" style="flex:1;padding:9px 6px;border:1.5px solid ${S.commTab===t.id?'var(--g)':'var(--bdr)'};background:${S.commTab===t.id?'var(--gl)':'#fff'};color:${S.commTab===t.id?'var(--gd)':'var(--mt)'};border-radius:var(--r);font-size:13px;font-weight:${S.commTab===t.id?'600':'400'};cursor:pointer">${t.lbl}</button>`).join('')}
  </div>
  ${S.commTab==='broadcast'?bBroadcast():S.commTab==='followup'?bFollowUp():bTemplates()}`;
}

function bBroadcast(){
  const tmplOpts=C.templates.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  const classOpts=C.classes.map(c=>`<option value="${c.class_group}">${c.name}</option>`).join('');
  const target=S.commTarget;
  // Build recipient list
  let recipients=[];
  if(target==='all') recipients=C.parents.filter(p=>p.phone||p.whatsapp);
  else if(target==='class') recipients=[...new Set(C.children.filter(c=>c.class_group===S.commClass).map(c=>parentOf(c.id)).filter(Boolean))];
  else if(target==='absent3'){
    const absent=C.children.filter(c=>{
      const last=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
      return !last||Math.floor((Date.now()-new Date(last.checkin_time))/(7*24*60*60*1000))>=3;
    });
    recipients=[...new Map(absent.map(c=>[c.parent_id,parentOf(c.id)]).filter(([,p])=>p)).values()];
  }
  const msgBody=S.commMsg||'';
  return`<div class="card">
    <div class="card-ttl">Send message to parents</div>
    <div class="fg"><label>Send to</label>
      <select onchange="S.commTarget=this.value;render()">
        <option value="all" ${target==='all'?'selected':''}>All parents (${C.parents.length})</option>
        <option value="class" ${target==='class'?'selected':''}>Specific class</option>
        <option value="absent3" ${target==='absent3'?'selected':''}>3-week absentees</option>
      </select>
    </div>
    ${target==='class'?`<div class="fg"><label>Select class</label>
      <select onchange="S.commClass=this.value;render()">
        <option value="">— choose class —</option>
        ${classOpts}
      </select>
    </div>`:''}
    <div class="fg"><label>Use a template (optional)</label>
      <select onchange="S.commTmpl=this.value;const t=C.templates.find(x=>x.id===this.value);if(t){S.commMsg=t.body;document.getElementById('comm_msg').value=t.body;}render()">
        <option value="">— or type your own message —</option>
        ${tmplOpts}
      </select>
    </div>
    <div class="fg"><label>Message *</label>
      <textarea id="comm_msg" placeholder="Type your message here… Use {parent_name} and {child_name} as placeholders." style="min-height:100px" oninput="S.commMsg=this.value">${msgBody}</textarea>
      <div class="hint">{parent_name} → replaced with each parent's name · {child_name} → their child's name</div>
    </div>
    <div class="alert ai" style="margin-bottom:12px">${ic('brand-whatsapp',16)}
      <div>Tapping <b>Send via WhatsApp</b> opens WhatsApp with each parent's pre-written message. Tap once per parent.<br>
      For bulk SMS, connect Termii in Settings.</div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--mt);margin-bottom:8px">${recipients.length} recipient${recipients.length!==1?'s':''}</div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:12px">
      ${recipients.slice(0,20).map(p=>{
        const kids=C.children.filter(c=>c.parent_id===p.id);
        const msg=encodeURIComponent((S.commMsg||'').replace(/{parent_name}/g,p.name).replace(/{child_name}/g,kids.map(c=>c.name).join(' & ')));
        return`<div class="li" style="min-height:44px">
          ${photoAv(p.name,p.photo_url,32,hue(p.name))}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${p.name}</div>
            <div style="font-size:11px;color:var(--mt)">${kids.map(c=>c.name).join(', ')}</div>
          </div>
          <div style="display:flex;gap:5px">
            ${p.whatsapp?`<a href="https://wa.me/${p.whatsapp}?text=${msg}" target="_blank" class="btn bwa bxs" style="font-size:11px">${ic('brand-whatsapp',13)}</a>`:''}
            ${p.phone?`<a href="sms:${p.phone}?body=${msg}" class="btn bsms bxs" style="font-size:11px">${ic('device-mobile-message',13)}</a>`:''}
            ${p.phone?`<a href="tel:${p.phone}" class="btn bo bxs" style="font-size:11px">${ic('phone',13)}</a>`:''}
          </div>
        </div>`;
      }).join('')}
      ${recipients.length>20?`<div style="text-align:center;font-size:12px;color:var(--ht);padding:8px">...and ${recipients.length-20} more</div>`:''}
    </div>
    ${recipients.length===0?`<div class="alert aw">${ic('alert-triangle',16)}<div>No recipients found for this selection.</div></div>`:''}
  </div>`;
}

function bFollowUp(){
  const today_sess=todaySess();
  // Children whose parents didn't check them in today — i.e. not present
  const notToday=C.children.filter(c=>!today_sess.some(s=>s.child_id===c.id));
  // Children still inside (late pickup)
  const stillIn=todaySess().filter(s=>!s.checkout_time);
  const longIn=stillIn.filter(s=>Math.floor((Date.now()-new Date(s.checkin_time))/60000)>120);
  // 3-week absentees
  const absent3=C.children.filter(c=>{
    const last=C.sessions.filter(s=>s.child_id===c.id).sort((a,b)=>new Date(b.checkin_time)-new Date(a.checkin_time))[0];
    return !last||Math.floor((Date.now()-new Date(last.checkin_time))/(7*24*60*60*1000))>=3;
  });
  return`
  ${longIn.length>0?`<div class="card" style="border-left:4px solid var(--red)">
    <div class="card-ttl" style="color:var(--red)">⚠️ Late pickup (${longIn.length})</div>
    ${longIn.map(s=>{
      const c=C.children.find(x=>x.id===s.child_id);if(!c)return'';
      const p=parentOf(c.id);
      const mins=Math.floor((Date.now()-new Date(s.checkin_time))/60000);
      const msg=encodeURIComponent(`Dear ${p?.name||'Parent'}, your child ${c.name} is still at GLT Children's Church and is ready for pickup. Please come to reception as soon as you can. God bless — GLT Children's Church.`);
      return`<div class="li">
        ${photoAv(c.name,c.photo_url,36,hue(c.name))}
        <div style="flex:1;min-width:0">
          <div style="font-size:13.5px;font-weight:600">${c.name}</div>
          <div style="font-size:11px;color:var(--red)">Inside for ${mins}min · ${p?p.name:''}</div>
        </div>
        ${p?.whatsapp?`<a href="https://wa.me/${p.whatsapp}?text=${msg}" target="_blank" class="btn bwa bxs">${ic('brand-whatsapp',13)}</a>`:''}
        ${p?.phone?`<a href="tel:${p.phone}" class="btn bo bxs">${ic('phone',13)}</a>`:''}
      </div>`;
    }).join('')}
  </div>`:''}

  <div class="card">
    <div class="card-ttl">Not present today (${notToday.length})</div>
    ${notToday.length===0?`<div style="text-align:center;font-size:13px;color:var(--ht);padding:12px">All registered children are present today 🎉</div>`:''}
    ${notToday.slice(0,30).map(c=>{
      const p=parentOf(c.id);
      const msg=encodeURIComponent(`Dear ${p?.name||'Parent'}, we missed ${c.name} in Children's Church today! We hope all is well. We look forward to seeing you next Sunday. God bless — GLT Children's Church 🙏`);
      return`<div class="li">
        ${photoAv(c.name,c.photo_url,32,hue(c.name))}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${c.name}</div>
          <div style="font-size:11px;color:var(--mt)">${c.class_group}${p?' · '+p.name:''}</div>
        </div>
        <div style="display:flex;gap:5px">
          ${p?.whatsapp?`<a href="https://wa.me/${p.whatsapp}?text=${msg}" target="_blank" class="btn bwa bxs" style="font-size:11px">${ic('brand-whatsapp',13)}</a>`:''}
          ${p?.phone?`<a href="tel:${p.phone}" class="btn bo bxs" style="font-size:11px">${ic('phone',13)}</a>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>

  ${absent3.length>0?`<div class="card">
    <div class="card-ttl" style="color:var(--red)">3+ week absentees (${absent3.length})</div>
    ${absent3.map(c=>{
      const p=parentOf(c.id);
      const msg=encodeURIComponent(`Dear ${p?.name||'Parent'}, we have missed ${c.name} in Children's Church for a few Sundays. We hope all is well with your family. Please know we are praying for you. God bless — GLT Children's Church 🙏`);
      return`<div class="li">
        ${photoAv(c.name,c.photo_url,32,hue(c.name))}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${c.name}</div>
          <div style="font-size:11px;color:var(--mt)">${c.class_group}${p?' · '+p.name:''}</div>
        </div>
        <div style="display:flex;gap:5px">
          ${p?.whatsapp?`<a href="https://wa.me/${p.whatsapp}?text=${msg}" target="_blank" class="btn bwa bxs" style="font-size:11px">${ic('brand-whatsapp',13)}</a>`:''}
          ${p?.phone?`<a href="tel:${p.phone}" class="btn bo bxs" style="font-size:11px">${ic('phone',13)}</a>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`:''}`;
}

function bTemplates(){
  if(S.tmplForm)return tmplForm();
  const cats={general:'General',followup:'Follow-up',emergency:'Emergency',checkout:'Checkout'};
  return`
  <div class="sec-hdr"><h3>Message templates (${C.templates.length})</h3>
    <button class="btn bp bsm" onclick="oTmplR()">${ic('user-plus')} New</button>
  </div>
  ${C.templates.map(t=>`<div class="card" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span class="badge ${t.category==='emergency'?'br':t.category==='checkout'?'bg':t.category==='followup'?'ba':'bb'}" style="font-size:11px">${cats[t.category]||t.category}</span>
      <span style="font-weight:600;font-size:14px;flex:1">${t.name}</span>
      <button class="btn bo bxs" onclick="oTmplE('${t.id}')">${ic('edit')}</button>
      <button class="btn bd bxs" onclick="dTmpl('${t.id}')">${ic('trash')}</button>
    </div>
    <div style="font-size:13px;color:var(--mt);line-height:1.6;background:#f9fdf9;padding:10px;border-radius:8px">${t.body}</div>
  </div>`).join('')}`;
}

function tmplForm(){
  const d=S.eTmplId?C.templates.find(x=>x.id===S.eTmplId):S.nc_tmpl;
  return`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn bo bsm" onclick="cTmplF()">${ic('arrow-left')}</button>
      <h3 style="font-size:15px;font-weight:600">${S.eTmplId?'Edit template':'New template'}</h3>
    </div>
    <div class="fg"><label>Template name *</label><input type="text" id="tp_name" value="${d.name}" placeholder="e.g. Sunday reminder"></div>
    <div class="fg"><label>Category</label>
      <select id="tp_cat">
        <option value="general" ${d.category==='general'?'selected':''}>General announcement</option>
        <option value="followup" ${d.category==='followup'?'selected':''}>Follow-up / pastoral care</option>
        <option value="emergency" ${d.category==='emergency'?'selected':''}>Emergency / urgent</option>
        <option value="checkout" ${d.category==='checkout'?'selected':''}>Checkout confirmation</option>
      </select>
    </div>
    <div class="fg"><label>Message body *</label>
      <textarea id="tp_body" style="min-height:120px" placeholder="Use {parent_name}, {child_name}, {checkout_time}, {message} as placeholders">${d.body}</textarea>
      <div class="hint">Available placeholders: {parent_name} {child_name} {checkout_time} {message}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn bp bfl" style="flex:1" onclick="sTmpl()" ${S.saving?'disabled':''}>${S.saving?ic('refresh',16)+' Saving…':ic('check')+' '+(S.eTmplId?'Save':'Create')}</button>
      <button class="btn bo" onclick="cTmplF()">Cancel</button>
    </div>
  </div>`;
}

function oTmplR(){S.tmplForm=true;S.eTmplId=null;S.nc_tmpl={name:'',body:'',category:'general'};render();}
function oTmplE(id){S.eTmplId=id;S.tmplForm=true;render();}
function cTmplF(){S.tmplForm=false;S.eTmplId=null;render();}

async function sTmpl(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const name=g('tp_name'),body=g('tp_body'),category=g('tp_cat');
  if(!name||!body){toast('Name and message body required');return;}
  S.saving=true;render();
  try{
    const data={name,body,category};
    if(S.eTmplId){
      await db.updTemplate(S.eTmplId,data);
      const idx=C.templates.findIndex(x=>x.id===S.eTmplId);
      if(idx>=0)C.templates[idx]={...C.templates[idx],...data};
    }else{
      const rows=await db.addTemplate(data);
      C.templates.push(Array.isArray(rows)?rows[0]:rows);
    }
    S.saving=false;S.tmplForm=false;S.eTmplId=null;toast(S.eTmplId?'Template updated':'Template created');render();
  }catch(e){S.saving=false;toast('Failed: '+e.message);render();}
}

async function dTmpl(id){
  if(!confirm('Delete this template?'))return;
  try{await db.delTemplate(id);C.templates=C.templates.filter(x=>x.id!==id);toast('Deleted');render();}
  catch(e){toast('Failed: '+e.message);}
}

function commAbsentClass(classGroup){
  S.tab='comms';S.commTab='broadcast';S.commTarget='class';S.commClass=classGroup;
  S.commMsg=`Dear {parent_name}, we missed {child_name} in Children's Church today! We hope all is well and look forward to seeing you next Sunday. God bless — GLT Children's Church 🙏`;
  render();
}
</script>
